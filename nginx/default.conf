# Define cache path in the top-level context
proxy_cache_path /var/cache/nginx/drupal_cache levels=1:2 keys_zone=drupal_cache:10m max_size=100m inactive=60m use_temp_path=off;

server {
    listen 80;
    server_name localhost;
    root /opt/drupal/web;

    index index.php index.html index.htm;  # Ensure index.php is prioritized

    # Logging settings (good for debugging)
    error_log /var/log/nginx/drupal_error.log crit;  # Reduced logging verbosity in production
    access_log /var/log/nginx/drupal_access.log combined;

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }

    # Pass PHP scripts to PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Connect to PHP-FPM using Docker service name 'web'
        fastcgi_pass web:9000;  # Use Docker networking to reach PHP-FPM container

        fastcgi_index index.php;
        include fastcgi_params;

        # Ensure SCRIPT_FILENAME is correct for Drupal's index.php
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Increase timeout for long-running PHP scripts
        fastcgi_read_timeout 300;  # 5 minutes
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Handle all other requests (Drupal clean URLs)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
        # Cache Drupal pages for 1 hour
        proxy_cache drupal_cache;
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating;
    }

    # Serve static assets directly and apply long caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        try_files $uri @rewrite;  # Fallback to Drupal if file not found (e.g. for image styles)
        expires max;
        log_not_found off;
        access_log off;
    }

    # Drupal private files
    location ~ ^/sites/.*/files/private/ {
        internal;  # Prevents direct access
    }

    # Drupal image styles (generated files)
    location ~ ^/sites/.*/files/styles/ {
        try_files $uri @rewrite;  # Allow Drupal to generate them if they don't exist
    }

    # Rewrites for Drupal's clean URLs (old style, usually covered by the / location)
    location @rewrite {
        rewrite ^ /index.php;
    }

    # Prevent direct access to .ht* files
    location ~ /\.ht {
        deny all;
    }
}