# Define cache path in the top-level context
proxy_cache_path /var/cache/nginx/drupal_cache levels=1:2 keys_zone=drupal_cache:10m max_size=100m inactive=60m use_temp_path=off;

server {
    listen 80;
    server_name localhost;
    root /opt/drupal/web;

    index index.php index.html index.htm;

    error_log /var/log/nginx/drupal_error.log crit;
    access_log /var/log/nginx/drupal_access.log combined;

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }

    # 🚫 Block access to Drupal update.php completely
    location = /update.php {
        return 404;
    }

    # Pass PHP scripts to PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass web:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        proxy_cache drupal_cache;
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        try_files $uri @rewrite;
        expires max;
        log_not_found off;
        access_log off;
    }

    location ~ ^/sites/.*/files/private/ {
        internal;
    }

    location ~ ^/sites/.*/files/styles/ {
        try_files $uri @rewrite;
    }

    location @rewrite {
        rewrite ^ /index.php;
    }

    location ~ /\.ht {
        deny all;
    }
}
