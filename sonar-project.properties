# Basic project info
sonar.projectKey=Drupal11portal
sonar.projectName=Drupal11portal
sonar.projectVersion=1.0

# Root folder for project
sonar.projectBaseDir=.

# Only scan custom code
sonar.sources=web/modules/custom,web/themes/custom

# Exclusions (recommended for Drupal)
sonar.exclusions=web/core/**,web/modules/contrib/**,vendor/**,**/*.min.js,**/*.css,**/*.twig

# PHPUnit coverage file
sonar.php.coverage.reportPaths=coverage/clover.xml

# Test file locations
sonar.tests=web/modules/custom
sonar.test.inclusions=**/*Test.php

# Encoding
sonar.sourceEncoding=UTF-8

sonar.issue.ignore.multicriteria=e1,e2,e3

sonar.issue.ignore.multicriteria.e1.ruleKey=php:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=web/**/src/**/*.php

sonar.issue.ignore.multicriteria.e2.ruleKey=php:S00100
sonar.issue.ignore.multicriteria.e2.resourceKey=web/**/src/**/*.php

sonar.issue.ignore.multicriteria.e3.ruleKey=php:S1448
sonar.issue.ignore.multicriteria.e3.resourceKey=web/**/src/**/*.php