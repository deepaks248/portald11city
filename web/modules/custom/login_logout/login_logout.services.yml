services:
  login_logout.user_redirect_subscriber:
    class: Drupal\login_logout\EventSubscriber\UserRedirectSubscriber
    arguments:
      - "@current_user"
      - "@path.current"
    tags:
      - { name: event_subscriber }

  login_logout.oauth_login_service:
    class: Drupal\login_logout\Service\OAuthLoginService
    arguments:
      [
        "@http_client",
        "@logger.channel.login_logout",
        "@request_stack",
        "@global_module.global_variables",
      ]

  login_logout.no_cache_subscriber:
    class: Drupal\login_logout\EventSubscriber\NoCacheSubscriber
    arguments: ['@current_user']
    tags:
      - { name: event_subscriber }

  login_logout.userinfo_validator:
    class: Drupal\login_logout\Service\UserInfoValidator
    arguments: ["@http_client", "@logger.channel.login_logout", "@session", "@global_module.global_variables"]

  login_logout.userinfo_check_subscriber:
    class: Drupal\login_logout\EventSubscriber\UserInfoCheckSubscriber
    arguments:
      - '@current_user'
      - '@session_manager'
      - '@login_logout.userinfo_validator'
      - '@logger.channel.login_logout'
      - '@path.current'
      - '@global_module.global_variables'
    tags:
      - { name: event_subscriber }

  login_logout.userinfo_cron_healthcheck:
    class: Drupal\login_logout\Service\UserInfoCronHealthCheck
    arguments:
      ["@login_logout.userinfo_validator", "@logger.channel.login_logout"]

  logger.channel.login_logout:
    parent: logger.channel_base
    arguments: ["login_logout"]

  login_logout.origin_subscriber:
    class: Drupal\login_logout\EventSubscriber\OriginGuardSubscriber
    arguments: ['%cors.config%']
    tags:
      - { name: event_subscriber }
  
  # login_logout.session_debug_subscriber:
  #   class: Drupal\login_logout\EventSubscriber\SessionDebugSubscriber
  #   arguments:
  #     - '@logger.channel.login_logout'
  #   tags:
  #     - { name: event_subscriber }

  login_logout.force_https_subscriber:
    class: Drupal\login_logout\EventSubscriber\ForceHttpsSubscriber
    tags:
      - { name: event_subscriber }

  login_logout.password_recovery_service:
    class: Drupal\login_logout\Service\PasswordRecoveryService
    arguments: ['@http_client','@global_module.global_variables', '@logger.channel.login_logout']