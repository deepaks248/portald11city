services:
  profile.profile_service:
    class: Drupal\profile\Service\ProfileService
    arguments:
      - '@http_client'
      - '@global_module.global_variables'
    tags:
      - { name: 'controller.service_arguments' }

  profile.service_request_api:
    class: Drupal\profile\Service\ServiceRequestApiService
    arguments: ["@http_client", "@global_module.global_variables"]

  profile.my_services_controller:
    class: Drupal\profile\Controller\MyServicesController
    arguments:
      - "@profile.service_request_api"
      - "@request_stack"
    tags:
      - { name: controller.service_arguments }

  profile.password_change:
    class: Drupal\profile\Service\PasswordChangeService
    arguments:
      - '@global_module.global_variables'
      - '@logger.factory'
      - '@current_user'
      - '@session'